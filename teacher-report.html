<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>华联中学初二忠评语系统</title>
  <link rel="stylesheet" href="css/pico.min.css">
  <style>
    :root { --pico-primary:#1a56db; --pico-primary-background:#1a56db; --pico-primary-hover:#1e40af; --pico-primary-hover-background:#1e40af; }
    .top-bar { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem; padding:0.5rem 0; }
    .top-bar h1 { margin:0; font-size:1.5rem; }
    .lang-bar { display:flex; justify-content:flex-end; gap:0.5rem; padding:0.25rem 0; }
    .lang-bar button { font-size:0.8rem; padding:0.25rem 0.75rem; }
    .subject-tabs { display:flex; flex-wrap:wrap; gap:0.4rem; margin-bottom:1.5rem; }
    .subject-tab { padding:0.5rem 1rem; border:1px solid var(--pico-muted-border-color); border-radius:var(--pico-border-radius); cursor:pointer; font-size:0.9rem; background:var(--pico-background-color); transition:all 0.2s; user-select:none; }
    .subject-tab:hover { border-color:var(--pico-primary); background:var(--pico-primary-hover); color:#fff; }
    .subject-tab.active { background:var(--pico-primary-background); color:#fff; border-color:var(--pico-primary-background); font-weight:600; }
    .progress-wrap { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
    .progress-wrap progress { flex:1; height:14px; }
    .progress-label { font-weight:700; white-space:nowrap; min-width:4rem; text-align:center; font-size:0.95rem; }
    .student-photo { width:96px; height:120px; object-fit:contain; border-radius:var(--pico-border-radius); border:1px solid var(--pico-muted-border-color); }
    .no-photo { width:96px; height:120px; background:var(--pico-muted-border-color); border-radius:var(--pico-border-radius); display:inline-flex; align-items:center; justify-content:center; font-size:11px; color:var(--pico-muted-color); text-align:center; padding:4px; }
    tr.row-complete td { opacity:0.55; } tr.row-complete textarea { border-color:#86efac; background:#f0fdf4; }
    .save-indicator { font-size:0.85rem; color:var(--pico-muted-color); display:flex; align-items:center; gap:0.35rem; }
    .save-indicator.saved { color:#16a34a; } .save-indicator.saving { color:#d97706; }
    .group-badge { display:inline-block; padding:1px 8px; border-radius:99px; font-size:0.75rem; font-weight:700; }
    .group-badge.A { background:#dbeafe; color:#1e40af; } .group-badge.B { background:#ede9fe; color:#6b21a8; }
    .site-footer { text-align:center; padding:2rem 1rem 1rem; font-size:0.8rem; color:var(--pico-muted-color); }
  @media (max-width:576px){
    main.container-fluid { padding:0.5rem 0.75rem 1rem !important; }
    .lang-bar.container-fluid { padding:0.25rem 0.75rem !important; }
    .top-bar { flex-direction:column; align-items:flex-start; gap:0.25rem; }
    .top-bar h1 { font-size:1.15rem; }
    .top-bar > div:last-child { width:100%; justify-content:space-between; }
    .subject-tab { padding:0.35rem 0.6rem; font-size:0.8rem; }
    table { font-size:0.82rem; }
    th,td { padding:0.4rem 0.3rem !important; }
    .student-photo { width:72px; height:90px; }
    .no-photo { width:72px; height:90px; font-size:9px; }
    textarea { font-size:0.9rem; min-height:80px; width:100%; box-sizing:border-box; }
    #studentTable th:nth-child(5), #studentTable td:nth-child(5) { min-width:220px; }
    #studentTable th:nth-child(2), #studentTable td:nth-child(2) { min-width:76px; }
    .save-indicator { font-size:0.75rem; }
  }
  </style>
</head>
<body>
  <div class="lang-bar container-fluid" style="padding:0.5rem 2rem;">
    <button class="secondary outline" id="langToggle" onclick="toggleLang()">English</button>
  </div>
  <main class="container-fluid" style="padding:0.5rem 2rem 1rem;">
    <div class="top-bar">
      <div>
        <h1 id="pageTitle" data-i18n="report.title">📝 学生评语录入</h1>
        <small style="color:var(--pico-muted-color);"><span data-i18n="report.hello">你好</span>，<strong id="teacherName">...</strong> — <span id="teacherRole"></span></small>
      </div>
      <div style="display:flex; gap:0.5rem; align-items:center;">
        <span class="save-indicator" id="saveStatus"><span id="saveIcon">✅</span> <span id="saveText" data-i18n="report.saved">已保存</span></span>
        <button class="secondary outline" onclick="showChangePwd()">🔑 改密码</button>
        <button class="secondary outline" onclick="logout()" data-i18n="report.logout">🚪 登出</button>
      </div>
    </div>
    <dialog id="pwdDialog">
      <article style="max-width:360px;">
        <h3>🔑 修改密码 / Change Password</h3>
        <label for="oldPwd">旧密码 / Old Password</label><input type="password" id="oldPwd" placeholder="输入当前密码">
        <label for="newPwd">新密码 / New Password</label><input type="password" id="newPwd" placeholder="输入新密码 (至少4位)">
        <div id="pwdDialogMsg" style="font-size:0.9rem; margin-top:0.5rem;"></div>
        <footer style="display:flex; gap:0.5rem; justify-content:flex-end; margin-top:1rem;">
          <button class="secondary" onclick="document.getElementById('pwdDialog').close()">取消</button>
          <button onclick="doChangePassword()">确认修改</button>
        </footer>
      </article>
    </dialog>
    <hr>
    <div class="subject-tabs" id="subjectTabs"></div>
    <div class="progress-wrap"><strong data-i18n="report.progress">进度</strong>: <progress id="progressBar" value="0" max="100"></progress><span class="progress-label" id="progressLabel">0 / 0</span></div>
    <div style="display:flex; gap:0.5rem; margin-bottom:1rem;"><button class="secondary outline" onclick="markCurrentComplete()" data-i18n="report.mark_complete">✅ 标记全部完成</button></div>
    <figure style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
      <table class="striped" id="studentTable">
        <thead><tr><th scope="col" style="width:45px;" data-i18n="report.col_no">No.</th><th scope="col" style="width:100px;" data-i18n="report.col_photo">照片</th><th scope="col" data-i18n="report.col_name">学生姓名 / Nama Murid</th><th scope="col" style="width:50px;" data-i18n="report.col_group">班</th><th scope="col" data-i18n="report.col_feedback">评语 / Maklum Balas</th><th scope="col" style="width:50px;" data-i18n="report.col_status">✅</th></tr></thead>
        <tbody id="tableBody"><tr><td colspan="6" style="text-align:center;" data-i18n="report.loading">加载中...</td></tr></tbody>
      </table>
    </figure>
    <div style="display:flex; justify-content:flex-end; gap:0.5rem; margin-top:1.5rem;"><button class="secondary" onclick="exportCSV()" data-i18n="report.export_csv">📥 导出 CSV</button></div>
  </main>
  <div class="site-footer" id="siteFooter" data-i18n="site.footer">© 2026 华联中学 · Hua Lian High School · CHEW YEN HAN 制作</div>

  <script src="js/i18n.js"></script><script src="js/auth.js"></script><script src="js/report-api.js"></script>
  <script>
    let allData=null, activeSubjectIndex=0, saveTimers={};
    (async function init(){ const auth=await requireAuth(); if(!auth)return; document.getElementById('teacherName').textContent=auth.teacher.display_name;
      const rl=auth.teacher.role==='form_teacher'?t('report.form_teacher'):'('+auth.subjects.length+' '+t('report.subjects_count')+')'; document.getElementById('teacherRole').textContent=rl;
      try{ allData=await getMyReports(); renderSubjectTabs(); renderActiveSubject(); }
      catch(err){ document.getElementById('tableBody').innerHTML='<tr><td colspan="6" style="text-align:center;color:#dc2626;">'+t('report.load_failed')+': '+err.message+'</td></tr>'; } })();
    function onLangChange(){ if(allData){ renderSubjectTabs(); renderActiveSubject(); } applyI18n(); const au=getUser(); if(au){ const rl=au.role==='form_teacher'?t('report.form_teacher'):allData?'('+allData.subjects.length+' '+t('report.subjects_count')+')':''; document.getElementById('teacherRole').textContent=rl; } updateTableHeaders(); }
    function renderSubjectTabs(){ document.getElementById('subjectTabs').innerHTML=allData.subjects.map((s,i)=>'<span class="subject-tab'+(i===activeSubjectIndex?' active':'')+'" onclick="switchSubject('+i+')">'+s.subject.display_name+' <small style="opacity:0.7;">'+s.progress.completed+'/'+s.progress.total+'</small></span>').join(''); }
    function switchSubject(i){ activeSubjectIndex=i; renderSubjectTabs(); renderActiveSubject(); }
    function renderActiveSubject(){ const subj=allData.subjects[activeSubjectIndex]; document.getElementById('pageTitle').textContent=subj.subject.display_name+' — '+t('report.title'); document.getElementById('progressBar').value=subj.progress.percentage; document.getElementById('progressLabel').textContent=subj.progress.completed+' / '+subj.progress.total;
      const tbody=document.getElementById('tableBody'); if(subj.students.length===0){ tbody.innerHTML='<tr><td colspan="6" style="text-align:center;">'+t('report.no_students')+'</td></tr>'; return; }
      tbody.innerHTML=subj.students.map((st,idx)=>{ const ph=st.photo_url?'<img src="photos/'+st.photo_url+'" class="student-photo" alt="'+st.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'inline-flex\';">'+'<div class="no-photo" style="display:none;">'+t('report.no_photo')+'</div>':'<div class="no-photo">'+t('report.no_photo')+'</div>';
        return '<tr class="'+(st.is_complete?'row-complete':'')+'" id="row-'+st.id+'"><td>'+(idx+1)+'</td><td>'+ph+'</td><td><strong>'+st.name+'</strong></td><td><span class="group-badge '+st.group_code+'">'+st.group_code+'</span></td><td><textarea id="ta-'+st.id+'" oninput="onInput('+st.id+',\''+subj.subject.code+'\')" placeholder="'+t('report.placeholder')+'">'+(st.feedback||'')+'</textarea></td><td><input type="checkbox" id="cb-'+st.id+'" '+(st.is_complete?'checked':'')+' onclick="toggleComplete('+st.id+',\''+subj.subject.code+'\',this.checked)"></td></tr>'; }).join('');
      updateTableHeaders(); }
    function updateTableHeaders(){ const ths=document.querySelectorAll('#studentTable thead th'); if(ths.length>=6){ ths[0].textContent=t('report.col_no'); ths[1].textContent=t('report.col_photo'); ths[2].textContent=t('report.col_name'); ths[3].textContent=t('report.col_group'); ths[4].textContent=t('report.col_feedback'); ths[5].textContent=t('report.col_status'); } }
    function onInput(sid,sc){ const ta=document.getElementById('ta-'+sid),cb=document.getElementById('cb-'+sid),row=document.getElementById('row-'+sid),has=ta.value.trim().length>0; if(has&&!cb.checked)cb.checked=true; if(!has&&cb.checked)cb.checked=false; row.classList.toggle('row-complete',cb.checked);
      if(saveTimers[sid])clearTimeout(saveTimers[sid]); saveTimers[sid]=setTimeout(async()=>{ document.getElementById('saveIcon').textContent='⏳'; document.getElementById('saveText').textContent=t('report.saving'); document.getElementById('saveStatus').className='save-indicator saving';
        try{ await saveReport(sid,sc,ta.value,cb.checked); document.getElementById('saveIcon').textContent='✅'; document.getElementById('saveText').textContent=t('report.saved'); document.getElementById('saveStatus').className='save-indicator saved'; const subj=allData.subjects[activeSubjectIndex]; const st=subj.students.find(s=>s.id===sid); if(st){ st.feedback=ta.value; st.is_complete=cb.checked; } recalcProgress(); renderSubjectTabs(); }
        catch(err){ document.getElementById('saveIcon').textContent='⚠️'; document.getElementById('saveText').textContent=t('report.save_failed'); console.error(err); } },2000); }
    function toggleComplete(sid,sc,chk){ const ta=document.getElementById('ta-'+sid),row=document.getElementById('row-'+sid); row.classList.toggle('row-complete',chk); saveReport(sid,sc,ta.value,chk).catch(console.error); const subj=allData.subjects[activeSubjectIndex]; const st=subj.students.find(s=>s.id===sid); if(st)st.is_complete=chk; recalcProgress(); renderSubjectTabs(); }
    function recalcProgress(){ const subj=allData.subjects[activeSubjectIndex]; const c=subj.students.filter(s=>s.is_complete).length; subj.progress.completed=c; subj.progress.percentage=subj.progress.total>0?Math.round((c/subj.progress.total)*100):0; document.getElementById('progressBar').value=subj.progress.percentage; document.getElementById('progressLabel').textContent=c+' / '+subj.progress.total; }
    async function markCurrentComplete(){ if(!confirm(t('report.confirm_complete')))return; const subj=allData.subjects[activeSubjectIndex]; try{ await markSubjectComplete(subj.subject.code); subj.students.forEach(s=>{s.is_complete=true; s.feedback=s.feedback||'';}); subj.progress.completed=subj.progress.total; subj.progress.percentage=100; renderActiveSubject(); renderSubjectTabs(); }catch(err){ alert(t('report.error_operation')+': '+err.message); } }
    function showChangePwd(){ document.getElementById('oldPwd').value=''; document.getElementById('newPwd').value=''; document.getElementById('pwdDialogMsg').textContent=''; document.getElementById('pwdDialog').showModal(); }
    async function doChangePassword(){ const oldPwd=document.getElementById('oldPwd').value,newPwd=document.getElementById('newPwd').value,msg=document.getElementById('pwdDialogMsg'); if(!oldPwd||!newPwd){msg.textContent='⚠️ 请填写所有字段';return;} if(newPwd.length<4){msg.textContent='⚠️ 新密码至少4位';return;} try{ await changePassword(oldPwd,newPwd); msg.innerHTML='<span style="color:#16a34a;">✅ 密码修改成功！</span>'; setTimeout(()=>document.getElementById('pwdDialog').close(),1500); }catch(err){ msg.innerHTML='<span style="color:#dc2626;">❌ '+err.message+'</span>'; } }
    function exportCSV(){ const subj=allData.subjects[activeSubjectIndex]; const rows=[['No.',t('report.col_name'),t('report.col_group'),t('report.col_feedback'),t('report.col_status')]]; subj.students.forEach((st,idx)=>{ rows.push([idx+1,st.name,st.group_name,st.feedback,st.is_complete?t('dashboard.completed'):t('dashboard.incomplete')]); }); const csv='﻿'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n'); const b=new Blob([csv],{type:'text/csv;charset=utf-8'}); const u=URL.createObjectURL(b),a=document.createElement('a'); a.href=u; a.download='评语_'+subj.subject.display_name+'.csv'; a.click(); URL.revokeObjectURL(u); }
  </script>
</body>
</html>
