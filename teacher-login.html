<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>华联中学初二忠评语系统</title>
  <link rel="stylesheet" href="css/pico.min.css">
  <style>
    :root { --pico-primary: #1a56db; --pico-primary-background: #1a56db; --pico-primary-hover: #1e40af; --pico-primary-hover-background: #1e40af; }
    body { min-height:100vh; display:flex; flex-direction:column; background:linear-gradient(135deg,#f0f4ff 0%,#e8f0fe 50%,#f8fafc 100%); }
    main { flex:1; display:flex; align-items:center; justify-content:center; }
    .login-card { width:100%; max-width:420px; }
    .login-card header { text-align:center; }
    .login-card h2 { margin-bottom:0.2rem; }
    .error-msg { color:#dc2626; font-size:0.9rem; margin-top:0.5rem; display:none; }
    .lang-bar { display:flex; justify-content:space-between; align-items:center; padding:0.75rem 1rem; }
    .lang-bar button, .lang-bar a { font-size:0.8rem; padding:0.25rem 0.75rem; text-decoration:none; }
    .site-footer { text-align:center; padding:1rem; font-size:0.8rem; color:var(--pico-muted-color); }
  </style>
</head>
<body>
  <div class="lang-bar">
    <a href="https://chewyenhan.github.io/hualianhistory/" class="secondary outline" style="text-decoration:none;">🏠 返回主页 / Home</a>
    <button class="secondary outline" id="langToggle" onclick="toggleLang()">English</button>
  </div>
  <main class="container">
    <article class="login-card">
      <header><h2 data-i18n="login.heading">🏫 华联中学评语系统</h2><p style="color:var(--pico-muted-color);" data-i18n="login.subtitle">教师登录 / Teacher Login</p></header>
      <form id="loginForm" onsubmit="handleSubmit(event)">
        <label for="username" data-i18n="login.username">账号 / Username</label>
        <select id="username" required><option value="" disabled selected data-i18n="login.select_account">选择账号...</option></select>
        <label for="password" style="margin-top:1rem;" data-i18n="login.password">密码 / Password</label>
        <input type="password" id="password" data-i18n-placeholder="login.placeholder" placeholder="输入密码" required>
        <div class="error-msg" id="errorMsg"></div>
        <button type="submit" id="loginBtn" style="width:100%; margin-top:1.5rem;" data-i18n="login.button">登录 / Login</button>
      </form>
      <footer style="text-align:center;font-size:0.8rem;color:var(--pico-muted-color);" data-i18n="login.reset_hint">如需重置密码，请联系班主任</footer>
    </article>
  </main>
  <div class="site-footer" id="siteFooter" data-i18n="site.footer">© 2026 华联中学 · Hua Lian High School · CHEW YEN HAN 制作</div>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const teacherList = [
      { v:'form_teacher', i:'teacher.form_teacher' },{ v:'chinese_t', i:'teacher.chinese_t' },{ v:'malay_t', i:'teacher.malay_t' },
      { v:'english_t', i:'teacher.english_t' },{ v:'math_t', i:'teacher.math_t' },{ v:'science_t', i:'teacher.science_t' },
      { v:'geography_t', i:'teacher.geography_t' },{ v:'history_t', i:'teacher.history_t' },{ v:'computer_t', i:'teacher.computer_t' },
      { v:'pe_t', i:'teacher.pe_t' },{ v:'robotics_t', i:'teacher.robotics_t' },{ v:'art_t', i:'teacher.art_t' }
    ];
    function renderTeachers(){ const s=document.getElementById('username'); s.innerHTML=''; const o=document.createElement('option'); o.value=''; o.disabled=true; o.selected=true; o.textContent=t('login.select_account'); s.appendChild(o); teacherList.forEach(x=>{ const o=document.createElement('option'); o.value=x.v; o.textContent=t(x.i); s.appendChild(o); }); }
    function onLangChange(){ renderTeachers(); applyI18n(); }
    function redirect(r){ window.location.href=(r.teacher?r.teacher.role:r.role)==='form_teacher'?'form-teacher.html':'teacher-report.html'; }
    async function handleSubmit(e){ e.preventDefault(); const u=document.getElementById('username').value, p=document.getElementById('password').value, b=document.getElementById('loginBtn'), er=document.getElementById('errorMsg'); b.disabled=true; b.textContent='...'; er.style.display='none'; try { const d=await login(u,p); redirect(d); } catch(err){ er.textContent='❌ '+(getLang()==='zh'?'账号或密码错误':'Invalid credentials'); er.style.display='block'; b.disabled=false; b.textContent=t('login.button'); } }
    (async function(){ try{ const a=await checkAuth(); if(a){ redirect(a); return; }}catch{} renderTeachers(); })();
  </script>
</body>
</html>
